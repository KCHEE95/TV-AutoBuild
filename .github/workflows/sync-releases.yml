name: Sync Upstream Releases

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically once every day
  workflow_dispatch: # Allows you to manually trigger it with a button click

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Releases from Original Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # FIXME: Change these two lines to match the original project you copied!
          UPSTREAM_OWNER="iptvorganization"
          UPSTREAM_REPO="TV-AutoBuild"
          
          echo "Fetching releases from $UPSTREAM_OWNER/$UPSTREAM_REPO..."
          
          # Fetch the latest release tag from the upstream repo using GitHub CLI
          LATEST_TAG=$(gh api repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/releases/latest --jq '.tag_name')
          
          # Check if this release already exists in your fork
          MY_RELEASE=$(gh api repos/${{ github.repository }}/releases/tags/$LATEST_TAG --fail 2>/dev/null || echo "not_found")
          
          if [ "$MY_RELEASE" = "not_found" ]; then
            echo "New release found: $LATEST_TAG. Syncing..."
            
            # Download release information
            gh api repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/releases/latest > release_info.json
            TITLE=$(cat release_info.json | jq -r '.name')
            BODY=$(cat release_info.json | jq -r '.body')
            
            # Create the matching release inside your fork
            gh release create "$LATEST_TAG" --title "$TITLE" --notes "$BODY"
            
            # Download assets and re-upload them to your fork
            gh release download "$LATEST_TAG" -R "$UPSTREAM_OWNER/$UPSTREAM_REPO" --dir ./downloads
            for file in ./downloads/*; do
              if [ -f "$file" ]; then
                gh release upload "$LATEST_TAG" "$file"
              fi
            done
          else
            echo "Your fork is already up to date with the latest release ($LATEST_TAG)."
          fi
